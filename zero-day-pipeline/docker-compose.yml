# ============================================================================
# Zero-Day Response Pipeline: standalone Compose stack for local dev.
#
# The portal/docker-compose.yml is the deployment compose that includes
# this alongside the other modules behind the portal gateway. This
# file is for running the pipeline in isolation during development.
# ============================================================================

services:

  backend:
    build:
      context: ./backend
    container_name: zero-day-pipeline-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - zero-day-audit:/data
    networks:
      - zero-day-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: zero-day-pipeline-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5175:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - zero-day-net

networks:
  zero-day-net:
    driver: bridge
    name: zero-day-net

volumes:
  zero-day-audit:
    name: zero-day-audit
