# nginx config for the compliance troubleshooter frontend.
#
# Single-page app. Every URL that doesn't match a real file falls
# back to index.html so client-side routing works (the MVP has no
# routes today but this future-proofs against adding them).
#
# No proxying to the backend: the React app talks directly to the
# backend's CORS-allowed origin. Adding a /api proxy here would let
# the frontend pretend the backend is same-origin, which is a
# pattern worth using at scale to avoid CORS preflights, but it
# adds another moving piece for the MVP.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback. Any path that doesn't match a static file
    # returns index.html so React Router (when added) can handle
    # the routing in the browser.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bare-minimum security headers. A real deployment behind the
    # corporate edge would have these set globally; the MVP sets
    # them locally so even a standalone run gets them.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
}
