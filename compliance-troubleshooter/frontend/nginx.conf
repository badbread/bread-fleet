# nginx config for the compliance troubleshooter frontend.
#
# Serves the Vite-built React bundle AND reverse-proxies /api/ to the
# backend container on the same docker network. Same-origin design:
# the browser sees one hostname, no CORS preflights, and the backend
# is never directly exposed to the public (only reachable through
# this nginx).
#
# The upstream "backend" resolves via docker DNS to the backend
# container's IP. This works because the compose file attaches both
# the frontend and the backend to the same network.

upstream backend {
    server compliance-troubleshooter-backend:8088;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Backend API proxy. Same-origin from the browser's perspective.
    # /api/hosts/search -> http://compliance-troubleshooter-backend:8088/api/hosts/search
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Long timeout for the (manual-only now, but future) remediation
        # endpoint which in principle could take up to 2 minutes.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Health endpoint passthrough for monitoring.
    location = /healthz {
        proxy_pass http://backend/healthz;
        access_log off;
    }

    # SPA fallback. Any path that doesn't match a real file or the
    # API proxy returns index.html so React Router (when added) can
    # handle the routing in the browser.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bare-minimum security headers. A real deployment behind the
    # corporate edge would have these set globally; the MVP sets
    # them locally so even a standalone run gets them.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
}
