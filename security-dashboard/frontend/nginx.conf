# nginx config for the security dashboard frontend.
#
# Same pattern as the compliance troubleshooter: serves the Vite-built
# React bundle and reverse-proxies /dashboard/api/ to the backend for
# standalone development. When deployed behind the portal gateway, the
# portal handles API routing and this proxy block is unused (but
# harmless to keep).

upstream dashboard-backend {
    server security-dashboard-backend:8089;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy for standalone development. The portal gateway handles
    # this route in the deployed topology.
    location /dashboard/api/ {
        rewrite ^/dashboard/api/(.*) /api/$1 break;
        proxy_pass http://dashboard-backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # SPA fallback. Vite builds with base: '/dashboard/' so all asset
    # paths are /dashboard/assets/... which resolve to files on disk.
    # Any path that doesn't match a file returns index.html for
    # client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
}
