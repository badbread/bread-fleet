# ============================================================================
# Portal deployment stack: gateway + all modules.
#
# Intended for a DMZ host where cloudflared routes
# fleet.badbread.com to portal:80. All containers share an internal
# network; only the portal is attached to the external
# wordpress_frontend network that cloudflared can reach.
#
# Usage:
#   docker compose up -d --build
#
# Prerequisites:
#   - .env with FLEET_API_URL, FLEET_API_TOKEN, ANTHROPIC_API_KEY
#   - Fleet self-signed cert at ./tls/fleet.crt (for troubleshooter
#     backend to reach Fleet over HTTPS)
#   - wordpress_frontend docker network must already exist (created by
#     the existing reverse-proxy compose stack on the DMZ host)
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # Portal: nginx gateway serving the landing page and routing each
  # module by path prefix. The only container exposed to cloudflared.
  # --------------------------------------------------------------------------
  portal:
    build:
      context: ../portal
    container_name: portal
    restart: unless-stopped
    networks:
      - portal-internal
      - wordpress_frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # Compliance Troubleshooter: live data from the real Fleet instance.
  # --------------------------------------------------------------------------
  compliance-troubleshooter-backend:
    build:
      context: ../compliance-troubleshooter/backend
    container_name: compliance-troubleshooter-backend
    restart: unless-stopped
    environment:
      FLEET_API_URL: ${FLEET_API_URL}
      FLEET_API_TOKEN: ${FLEET_API_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      AUDIT_LOG_PATH: /data/troubleshooter.jsonl
      NOTION_API_TOKEN: ${NOTION_API_TOKEN:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
    volumes:
      - troubleshooter-audit:/data
    networks:
      - portal-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  compliance-troubleshooter-frontend:
    build:
      context: ../compliance-troubleshooter/frontend
    container_name: compliance-troubleshooter-frontend
    restart: unless-stopped
    depends_on:
      compliance-troubleshooter-backend:
        condition: service_healthy
    networks:
      - portal-internal

  # --------------------------------------------------------------------------
  # Security Posture Dashboard: augmented/synthetic data.
  # --------------------------------------------------------------------------
  security-dashboard-backend:
    build:
      context: ../security-dashboard/backend
    container_name: security-dashboard-backend
    restart: unless-stopped
    networks:
      - portal-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8089/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  security-dashboard-frontend:
    build:
      context: ../security-dashboard/frontend
    container_name: security-dashboard-frontend
    restart: unless-stopped
    depends_on:
      security-dashboard-backend:
        condition: service_healthy
    networks:
      - portal-internal

  # --------------------------------------------------------------------------
  # Zero-Day Response Pipeline: live KEV data + curated registry.
  # --------------------------------------------------------------------------
  zero-day-pipeline-backend:
    build:
      context: ../zero-day-pipeline/backend
    container_name: zero-day-pipeline-backend
    restart: unless-stopped
    environment:
      FLEET_API_URL: ${FLEET_API_URL}
      FLEET_API_TOKEN: ${FLEET_API_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
    volumes:
      - zero-day-audit:/data
    networks:
      - portal-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  zero-day-pipeline-frontend:
    build:
      context: ../zero-day-pipeline/frontend
    container_name: zero-day-pipeline-frontend
    restart: unless-stopped
    depends_on:
      zero-day-pipeline-backend:
        condition: service_healthy
    networks:
      - portal-internal

networks:
  portal-internal:
    driver: bridge
    name: portal-internal

  # The existing reverse-proxy stack on the DMZ host creates this network.
  # cloudflared is attached to it and can reach any container on it
  # by docker DNS name.
  wordpress_frontend:
    external: true

volumes:
  troubleshooter-audit:
    name: troubleshooter-audit
  zero-day-audit:
    name: zero-day-audit
