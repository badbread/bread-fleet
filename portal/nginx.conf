# Portal gateway nginx: single entry point for fleet.badbread.com.
#
# Routes each module to its own frontend + backend containers by path
# prefix. The portal itself serves a static landing page at / with
# links to each module. Fleet's admin UI is intentionally NOT routed
# through this gateway (LAN-only, not publicly exposed).
#
# Uses variable-based proxy_pass instead of upstream blocks so nginx
# resolves container DNS at request time, not at startup. This avoids
# the "host not found in upstream" crash when the portal container
# starts before the module containers are healthy.
#
# Adding a new module: add two location blocks (one for /module/api/,
# one for /module/) with a set $target line. That's it.

server {
    listen 80;
    server_name _;

    # Docker's embedded DNS. Required for variable-based proxy_pass
    # to resolve container names at request time.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # Compliance Troubleshooter
    # ------------------------------------------------------------------

    # API routes go first (more specific prefix match). Strips
    # /compliance/api/ and passes /api/ to the backend.
    location /compliance/api/ {
        set $troubleshooter_backend http://compliance-troubleshooter-backend:8088;
        rewrite ^/compliance/api/(.*) /api/$1 break;
        proxy_pass $troubleshooter_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Frontend static assets + SPA fallback. Strips /compliance/ prefix
    # so the troubleshooter's nginx sees requests at /.
    location /compliance/ {
        set $troubleshooter_frontend http://compliance-troubleshooter-frontend;
        rewrite ^/compliance/(.*) /$1 break;
        proxy_pass $troubleshooter_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Security Posture Dashboard
    # ------------------------------------------------------------------

    location /dashboard/api/ {
        set $dashboard_backend http://security-dashboard-backend:8089;
        rewrite ^/dashboard/api/(.*) /api/$1 break;
        proxy_pass $dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /dashboard/ {
        set $dashboard_frontend http://security-dashboard-frontend;
        rewrite ^/dashboard/(.*) /$1 break;
        proxy_pass $dashboard_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Zero-Day Response Pipeline
    # ------------------------------------------------------------------

    location /zero-day/api/ {
        set $zeroday_backend http://zero-day-pipeline-backend:8090;
        rewrite ^/zero-day/api/(.*) /api/$1 break;
        proxy_pass $zeroday_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /zero-day/ {
        set $zeroday_frontend http://zero-day-pipeline-frontend;
        rewrite ^/zero-day/(.*) /$1 break;
        proxy_pass $zeroday_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Landing page (portal root)
    # ------------------------------------------------------------------

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck for the portal itself.
    location = /healthz {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
        access_log off;
    }

    # Security headers.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
}
